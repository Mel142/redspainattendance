<script type="text/babel" data-presets="env,react">
/* global React, ReactDOM, lucide */

const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ---------- icons: tiny React wrappers over lucide's static SVGs ----------
function Icon({ name, size = 16, strokeWidth = 2, className = "" }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const node = lucide.icons[name] || lucide.icons[kebab(name)];
    if (!node) return;
    // node is an array: ['svg', attrs, children]
    ref.current.innerHTML = "";
    ref.current.appendChild(lucide.createElement(node));
    const svg = ref.current.querySelector("svg");
    if (svg) {
      svg.setAttribute("width", size);
      svg.setAttribute("height", size);
      svg.setAttribute("stroke-width", strokeWidth);
    }
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={"inline-flex items-center justify-center " + className} aria-hidden="true" />;
}
function kebab(s) { return s.replace(/([a-z])([A-Z])/g, "$1-$2").toLowerCase(); }

// ---------- team ----------
const TEAM_MEMBERS = [
  "Alberto Marquez",
  "Antonio Ruiz",
  "Carlos Gallego",
  "Diogo Vidigal",
  "Ivan Puchades",
  "Javier Serrano",
  "Juan Ayala",
  "Manuel Llera",
  "Manuel Marchiani",

  "Rustico De Jesús",
];

// ---------- 2026 Madrid public holidays ----------
const BANK_HOLIDAYS_2026 = {
  "2026-01-01": "New Year's Day",
  "2026-01-06": "Epiphany",
  "2026-04-02": "Maundy Thursday",
  "2026-04-03": "Good Friday",
  "2026-05-01": "Labour Day",
  "2026-05-02": "Madrid Community Day",
  "2026-05-15": "San Isidro",
  "2026-08-15": "Assumption",
  "2026-10-12": "National Day",
  "2026-11-02": "All Saints' Day",
  "2026-11-09": "La Almudena",
  "2026-12-07": "Constitution Day",
  "2026-12-08": "Immaculate Conception",
  "2026-12-25": "Christmas Day",
};

// ---------- date helpers (plain JS) ----------
const pad = n => String(n).padStart(2, "0");
const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseYmd = s => { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); };
const isSameDay = (a, b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
const isWeekend = d => d.getDay() === 0 || d.getDay() === 6;
const startOfWeek = d => { // Mon=0
  const x = new Date(d); const day = (x.getDay() + 6) % 7; x.setDate(x.getDate() - day); x.setHours(0,0,0,0); return x;
};
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const startOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
const endOfMonth   = d => new Date(d.getFullYear(), d.getMonth()+1, 0);
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const WEEKDAY_SHORT = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const WEEKDAY_LONG  = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

// ---------- chip style: uniform Engie Blue brand wash ----------
function chipStyle() {
  return {
    "--chip-bg":     "rgba(0,158,227,0.10)",
    "--chip-border": "rgba(0,158,227,0.25)",
    "--chip-fg":     "#003B64",
  };
}

// ---------- storage layer ----------
// Supabase-backed. One row per booking: { id, date, name, slot, created_at }.
// Per-device prefs (current user, view) live in localStorage.

const SUPABASE_URL = "https://zpokuupcilnszzfmvrmq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpwb2t1dXBjaWxuc3p6Zm12cm1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTkzMDEsImV4cCI6MjA5MjI3NTMwMX0.O3__3vb2F3KlWERWTIoi5m3JNUGJZVQ_-qg7z_cqxw0";

const sb = (window.supabase && window.supabase.createClient)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      realtime: { params: { eventsPerSecond: 10 } }
    })
  : null;

// Simple token-bucket rate limit (per-device). 60 writes / minute burstable to 10.
const RL_CAPACITY = 10;
const RL_REFILL_PER_SEC = 1; // 60/min
let rlTokens = RL_CAPACITY;
let rlLast = Date.now();
function rateLimitTake() {
  const now = Date.now();
  const elapsed = (now - rlLast) / 1000;
  rlTokens = Math.min(RL_CAPACITY, rlTokens + elapsed * RL_REFILL_PER_SEC);
  rlLast = now;
  if (rlTokens < 1) return false;
  rlTokens -= 1;
  return true;
}

// Turn a flat list of {date,name,slot,id} rows into date->entries[] map.
function rowsToMap(rows) {
  const map = {};
  for (const r of rows) {
    const key = r.date; // already "YYYY-MM-DD"
    (map[key] = map[key] || []).push({ id: r.id, name: r.name, slot: r.slot });
  }
  return map;
}

function useStorage() {
  const [bookings, setBookings] = useState({});
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [savingCount, setSavingCount] = useState(0);
  const [lastSync, setLastSync] = useState(null);
  const [rateLimited, setRateLimited] = useState(false);

  const refresh = useCallback(async () => {
    if (!sb) { setError("Supabase client not loaded"); return; }
    try {
      const { data, error: err } = await sb.from("bookings").select("id,date,name,slot");
      if (err) throw err;
      setBookings(rowsToMap(data || []));
      setLastSync(new Date());
      setError(null);
    } catch (e) {
      setError(String(e?.message || e));
    }
  }, []);

  // Initial load + realtime subscription
  useEffect(() => {
    let mounted = true;
    (async () => {
      try { await refresh(); } finally { if (mounted) setLoading(false); }
    })();

    if (!sb) return;
    const channel = sb
      .channel("bookings-changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "bookings" }, () => {
        refresh();
      })
      .subscribe();

    const onFocus = () => refresh();
    window.addEventListener("focus", onFocus);

    return () => {
      mounted = false;
      window.removeEventListener("focus", onFocus);
      try { sb.removeChannel(channel); } catch {}
    };
  }, [refresh]);

  // Operations — insert/update/delete go directly to Supabase.
  // We also optimistically update local state so the UI feels snappy.

  const doWithRateLimit = useCallback(async (fn) => {
    if (!rateLimitTake()) {
      setRateLimited(true);
      setTimeout(() => setRateLimited(false), 2500);
      throw new Error("Too many actions — slow down for a sec.");
    }
    setSavingCount(c => c + 1);
    try {
      await fn();
      setError(null);
    } catch (e) {
      setError(String(e?.message || e));
      // On failure, re-sync so the UI reflects server truth
      refresh();
      throw e;
    } finally {
      setSavingCount(c => Math.max(0, c - 1));
      setLastSync(new Date());
    }
  }, [refresh]);

  const insertBookings = useCallback(async (rows) => {
    // rows: [{id, date, name, slot}]
    if (!sb || rows.length === 0) return;
    await doWithRateLimit(async () => {
      // Optimistic
      setBookings(prev => {
        const next = { ...prev };
        for (const r of rows) {
          const list = (next[r.date] || []).slice();
          list.push({ id: r.id, name: r.name, slot: r.slot });
          next[r.date] = list;
        }
        return next;
      });
      const { error: err } = await sb.from("bookings").insert(rows);
      if (err) throw err;
    });
  }, [doWithRateLimit]);

  const deleteBooking = useCallback(async (date, id) => {
    if (!sb) return;
    await doWithRateLimit(async () => {
      setBookings(prev => {
        const list = (prev[date] || []).filter(b => b.id !== id);
        const next = { ...prev };
        if (list.length) next[date] = list; else delete next[date];
        return next;
      });
      const { error: err } = await sb.from("bookings").delete().eq("id", id);
      if (err) throw err;
    });
  }, [doWithRateLimit]);

  const updateSlot = useCallback(async (date, id, slot) => {
    if (!sb) return;
    await doWithRateLimit(async () => {
      setBookings(prev => {
        const list = (prev[date] || []).map(b => b.id === id ? { ...b, slot } : b);
        return { ...prev, [date]: list };
      });
      const { error: err } = await sb.from("bookings").update({ slot }).eq("id", id);
      if (err) throw err;
    });
  }, [doWithRateLimit]);

  return {
    bookings, loading, error, saving: savingCount > 0, lastSync, rateLimited,
    insertBookings, deleteBooking, updateSlot, refresh
  };
}

// ---------- local-only prefs (current user + view) ----------
const PREFS_KEY = "attendance:prefs";
function usePrefs() {
  const [prefs, setPrefs] = useState({ view: "month", user: null });
  const [ready, setReady] = useState(false);
  useEffect(() => {
    try {
      const raw = localStorage.getItem(PREFS_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        const safeView = ["month", "week"].includes(parsed.view) ? parsed.view : "month";
        const safeUser = TEAM_MEMBERS.includes(parsed.user) ? parsed.user : null;
        setPrefs(p => ({ ...p, view: safeView, user: safeUser }));
      }
    } catch {}
    setReady(true);
  }, []);
  const update = useCallback((patch) => {
    setPrefs(p => {
      const next = { ...p, ...patch };
      try { localStorage.setItem(PREFS_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);
  return [prefs, update, ready];
}

// ---------- booking-insert shaping ----------
// Given a desired (date,name,slot), produce the rows to INSERT after resolving
// conflicts locally against current bookings. Returns { rowsToInsert, idsToDelete }.
const VALID_SLOTS = new Set(["full", "am", "pm"]);
function planBookingInserts(bookings, dates, name, slot) {
  if (!VALID_SLOTS.has(slot) || !TEAM_MEMBERS.includes(name)) return { rowsToInsert: [], idsToDelete: [] };
  const rowsToInsert = [];
  const idsToDelete = [];
  for (const date of dates) {
    const list = bookings[date] || [];
    const mine = list.filter(b => b.name === name);
    if (slot === "full") {
      // Replace all of this person's entries for that day with a single "full".
      for (const b of mine) idsToDelete.push({ date, id: b.id });
      rowsToInsert.push({ id: crypto.randomUUID(), date, name, slot: "full" });
    } else {
      // am / pm
      if (mine.some(b => b.slot === "full") || mine.some(b => b.slot === slot)) continue;
      rowsToInsert.push({ id: crypto.randomUUID(), date, name, slot });
    }
  }
  return { rowsToInsert, idsToDelete };
}

// ---------- UI pieces ----------
function NameChip({ name, slot, onClick, size="sm", title }) {
  const style = chipStyle(name);
  const px = size === "lg" ? "px-2.5 py-1 text-[13px]" : "px-2 py-[3px] text-[11.5px]";
  const cls = `chip inline-flex items-center gap-1.5 rounded-full font-medium leading-none max-w-full ${px} ${onClick ? "hover:brightness-[0.98] active:brightness-95 cursor-pointer" : ""}`;
  const content = (
    <>
      <span className="chip-dot w-1.5 h-1.5 rounded-full shrink-0" />
      <span className="truncate">{name}</span>
      {slot !== "full" && (
        <span className="text-[9.5px] font-semibold tracking-wider opacity-70 shrink-0">
          {slot.toUpperCase()}
        </span>
      )}
    </>
  );
  const tip = title || `${name}${slot!=="full" ? " · "+slot.toUpperCase() : ""}`;
  // Render as <span> so NameChip can safely nest inside a button/clickable cell.
  return (
    <span
      role={onClick ? "button" : undefined}
      tabIndex={onClick ? 0 : undefined}
      onClick={onClick}
      onKeyDown={onClick ? (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onClick(e); } } : undefined}
      style={style}
      title={tip}
      className={cls}
    >
      {content}
    </span>
  );
}

function SlotPicker({ value, onChange, compact=false }) {
  const opts = [
    { k: "full", label: "Full day", sub: "09:00 – 18:00" },
    { k: "am",   label: "Morning",  sub: "09:00 – 13:00" },
    { k: "pm",   label: "Afternoon",sub: "14:00 – 18:00" },
  ];
  return (
    <div className={`grid gap-2 ${compact ? "grid-cols-3" : "grid-cols-3"}`}>
      {opts.map(o => {
        const active = value === o.k;
        return (
          <button
            key={o.k}
            type="button"
            onClick={() => onChange(o.k)}
            className={`text-left rounded-[10px] border px-3 py-2.5 transition ${
              active
                ? "border-[#009EE3] bg-[rgba(0,158,227,0.10)]"
                : "border-[var(--line)] bg-[var(--card)] hover:border-[var(--line-2)]"
            }`}
          >
            <div className="flex items-center gap-1.5">
              <span className={`w-3 h-3 rounded-full border-2 ${active ? "border-[var(--accent)] bg-[var(--accent)]" : "border-[var(--line-2)] bg-transparent"}`} />
              <span className="text-[13px] font-semibold">{o.label}</span>
            </div>
            <div className="text-[11px] text-[var(--ink-3)] mt-0.5 ml-[18px]">{o.sub}</div>
          </button>
        );
      })}
    </div>
  );
}

// ---------- Modals ----------
function Modal({ children, onClose, width="max-w-md" }) {
  useEffect(() => {
    const onKey = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop animate-fade" onClick={onClose}>
      <div
        className={`${width} w-full bg-[var(--card)] rounded-[14px] card-shadow-lg animate-pop`}
        onClick={e => e.stopPropagation()}
      >
        {children}
      </div>
    </div>
  );
}

// ---------- Booking modals ----------
function SingleDayModal({ date, currentUser, bookings, onClose, onConfirm }) {
  const entries = bookings[ymd(date)] || [];
  const mine = entries.filter(e => e.name === currentUser);
  const [slot, setSlot] = useState(() => {
    if (mine.some(e => e.slot === "full")) return "full";
    const has = mine.map(e => e.slot);
    if (has.includes("am") && has.includes("pm")) return "full";
    if (has.includes("am")) return "pm";
    if (has.includes("pm")) return "am";
    return "full";
  });
  const alreadyHas = (s) =>
    mine.some(e => e.slot === "full") ||
    mine.some(e => e.slot === s) ||
    (s === "full" && mine.length > 0);

  return (
    <Modal onClose={onClose}>
      <div className="p-5 border-b border-[var(--line)]">
        <div className="text-[11px] uppercase tracking-[0.12em] text-[var(--ink-3)] font-semibold">Book the office</div>
        <div className="mt-1 text-[22px] font-semibold leading-tight">
          {WEEKDAY_LONG[(date.getDay()+6)%7]}, {date.getDate()} {MONTH_NAMES[date.getMonth()]}
        </div>
        <div className="mt-0.5 text-[13px] text-[var(--ink-2)]">Booking as <span className="font-semibold text-[var(--ink)]">{currentUser}</span></div>
      </div>

      <div className="p-5">
        <div className="text-[12px] font-semibold text-[var(--ink-2)] mb-2">When will you be in?</div>

          <div className="mt-3 text-[12px] text-[var(--ink-3)] bg-[rgba(0,158,227,0.06)] border border-[var(--line)] rounded-lg px-3 py-2">

        {entries.length > 0 && (

}

function MultiDayModal({ anchor: initialAnchor, currentUser, bookings, onClose, onConfirm }) {
  const [slot, setSlot] = useState("full");
  const [selected, setSelected] = useState(() => new Set()); // set of "YYYY-MM-DD"
  const [viewMonth, setViewMonth] = useState(() => startOfMonth(initialAnchor || new Date()));

  const today = useMemo(() => { const d = new Date(); d.setHours(0,0,0,0); return d; }, []);

  const toggle = useCallback((d) => {
    const key = ymd(d);
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key); else next.add(key);
      return next;
    });
  }, []);

  const selectAllWeekdaysInMonth = () => {
    const s = startOfMonth(viewMonth), e = endOfMonth(viewMonth);
    setSelected(prev => {
      const next = new Set(prev);
      for (let d = new Date(s); d <= e; d = addDays(d, 1)) {
        if (!isWeekend(d) && d >= today) next.add(ymd(d));
      }
      return next;
    });
  };
  const selectWeek = () => {
    // select Mon-Fri of whatever week `viewMonth` aka the current anchor falls in; if viewing
    // a month that is not current month, use the first weekday of that month's visible week.
    const ref = (viewMonth.getMonth() === today.getMonth() && viewMonth.getFullYear() === today.getFullYear())
      ? today : startOfMonth(viewMonth);
    const mon = startOfWeek(ref);
    setSelected(prev => {
      const next = new Set(prev);
      for (let i = 0; i < 5; i++) {
        const d = addDays(mon, i);
        if (d >= today) next.add(ymd(d));
      }
      return next;
    });
  };
  const clearAll = () => setSelected(new Set());

  // Calendar grid
  const gridStart = startOfWeek(startOfMonth(viewMonth));
  const weeks = [];
  for (let w = 0; w < 6; w++) {
    const row = [];
    for (let i = 0; i < 7; i++) row.push(addDays(gridStart, w*7 + i));
    weeks.push(row);
  }

  const sortedSelection = useMemo(
    () => [...selected].sort().map(parseYmd),
    [selected]
  );

  return (
    <Modal onClose={onClose} width="max-w-2xl">
      <div className="p-5 border-b border-[var(--line)] flex items-start justify-between gap-4">
        <div>
          <div className="text-[11px] uppercase tracking-[0.12em] text-[var(--ink-3)] font-semibold">
            Book multiple days
          </div>
          <div className="mt-1 text-[22px] font-semibold leading-tight">Pick your days</div>
          <div className="mt-0.5 text-[13px] text-[var(--ink-2)]">
            Click any day to toggle. Booking as <span className="font-semibold text-[var(--ink)]">{currentUser}</span>.
          </div>
        </div>
        <button className="p-1.5 rounded-lg hover:bg-[rgba(0,158,227,0.08)]" onClick={onClose} aria-label="Close">
          <Icon name="X" size={18} />
        </button>
      </div>

      <div className="p-5 grid grid-cols-1 md:grid-cols-[1fr_220px] gap-5">
        {/* Calendar */}
        <div>
          <div className="flex items-center justify-between mb-2">
            <button
              onClick={() => setViewMonth(m => new Date(m.getFullYear(), m.getMonth()-1, 1))}
              className="btn-outline !p-1.5" aria-label="Previous month"
            ><Icon name="ChevronLeft" size={14} /></button>
            <div className="text-[14px] font-semibold">
              {MONTH_NAMES[viewMonth.getMonth()]} {viewMonth.getFullYear()}
            </div>
            <button
              onClick={() => setViewMonth(m => new Date(m.getFullYear(), m.getMonth()+1, 1))}
              className="btn-outline !p-1.5" aria-label="Next month"
            ><Icon name="ChevronRight" size={14} /></button>
          </div>

          <div className="grid grid-cols-7 text-[10px] uppercase tracking-[0.1em] font-semibold text-[var(--ink-3)] mb-1">
            {WEEKDAY_SHORT.map(d => <div key={d} className="px-1 py-1">{d}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {weeks.flat().map((d, i) => {
              const key = ymd(d);
              const inMonth = d.getMonth() === viewMonth.getMonth();
              const weekend = isWeekend(d);
              const isPast = d < today;
              const isToday = isSameDay(d, today);
              const isSel = selected.has(key);
              const count = (bookings[key] || []).length;

              return (
                <button
                  key={i}
                  type="button"
                  disabled={isPast}
                  onClick={() => toggle(d)}
                  className={`relative h-12 rounded-[8px] text-[13px] font-medium flex flex-col items-center justify-center transition border
                    ${isSel
                      ? "bg-[var(--accent)] text-white border-[var(--accent)]"
                      : weekend
                        ? "bg-[var(--weekend)] border-[var(--line)] text-[var(--ink-2)] hover:border-[var(--line-2)]"
                        : "bg-[var(--card)] border-[var(--line)] text-[var(--ink)] hover:border-[var(--accent)]"
                    }
                    ${!inMonth ? "opacity-40" : ""}
                    ${isPast ? "opacity-30 cursor-not-allowed" : ""}
                    ${isToday && !isSel ? "ring-1 ring-[var(--accent)]" : ""}
                  `}
                >
                  <span>{d.getDate()}</span>
                  {count > 0 && !isSel && (
                    <span className="absolute bottom-1 flex gap-[2px]">
                      {Array.from({length: Math.min(count, 3)}).map((_, j) => (
                        <span key={j} className="w-1 h-1 rounded-full bg-[var(--ink-3)]" />
                      ))}
                    </span>
                  )}
                </button>
              );
            })}
          </div>

          <div className="mt-3 flex flex-wrap items-center gap-2">
            <button onClick={selectWeek} className="btn-outline !py-1.5 !px-2.5 !text-[12px]">
              + This week (Mon–Fri)
            </button>
            <button onClick={selectAllWeekdaysInMonth} className="btn-outline !py-1.5 !px-2.5 !text-[12px]">
              + All weekdays in {MONTH_NAMES[viewMonth.getMonth()].slice(0,3)}
            </button>
            {selected.size > 0 && (
              <button onClick={clearAll} className="btn-ghost !py-1.5 !px-2.5 !text-[12px]">
                Clear
              </button>
            )}
          </div>
        </div>

        {/* Right column: summary + slot */}
        <div className="border-l border-[var(--line)] md:pl-5 md:border-l border-t md:border-t-0 pt-4 md:pt-0">
          <div className="text-[12px] font-semibold text-[var(--ink-2)] mb-2">
            Selected <span className="text-[var(--ink-3)] font-normal">({selected.size})</span>
          </div>
          {sortedSelection.length === 0 ? (
            <div className="text-[12px] text-[var(--ink-3)] italic border border-dashed border-[var(--line)] rounded-[8px] px-3 py-4 text-center">
              No days selected yet
            </div>
          ) : (
            <div className="flex flex-wrap gap-1 max-h-40 overflow-y-auto pr-1">
              {sortedSelection.map(d => (
                <button
                  key={ymd(d)}
                  onClick={() => toggle(d)}
                  className="text-[11.5px] px-2 py-1 rounded-md bg-[var(--accent-soft)] text-[var(--accent)] border border-[rgba(0,158,227,0.30)] hover:bg-[rgba(0,158,227,0.20)] inline-flex items-center gap-1"
                  title="Remove"
                >
                  {WEEKDAY_SHORT[(d.getDay()+6)%7]} {d.getDate()} {MONTH_NAMES[d.getMonth()].slice(0,3)}
                  <Icon name="X" size={10} />
                </button>
              ))}
            </div>
          )}

          <div className="text-[12px] font-semibold text-[var(--ink-2)] mt-4 mb-2">Which part of the day?</div>
          <div className="grid grid-cols-1 gap-1.5">
            {[
              { k: "full", label: "Full day", sub: "09:00 – 18:00" },
              { k: "am",   label: "Morning",  sub: "09:00 – 13:00" },
              { k: "pm",   label: "Afternoon",sub: "14:00 – 18:00" },
            ].map(o => {
              const active = slot === o.k;
              return (
                <button
                  key={o.k}
                  onClick={() => setSlot(o.k)}
                  className={`text-left rounded-[8px] border px-2.5 py-2 transition ${
                    active
                      ? "border-[var(--accent)] bg-[rgba(0,158,227,0.10)]"
                      : "border-[var(--line)] bg-[var(--card)] hover:border-[var(--line-2)]"
                  }`}
                >
                  <div className="flex items-center gap-1.5">
                    <span className={`w-2.5 h-2.5 rounded-full border-2 ${active ? "border-[var(--accent)] bg-[var(--accent)]" : "border-[var(--line-2)]"}`} />
                    <span className="text-[12.5px] font-semibold">{o.label}</span>
                  </div>
                  <div className="text-[10.5px] text-[var(--ink-3)] ml-[16px]">{o.sub}</div>
                </button>
              );
            })}
          </div>
        </div>
      </div>

      <div className="p-4 flex items-center justify-between border-t border-[var(--line)]">
        <div className="text-[11.5px] text-[var(--ink-3)]">
          Tip: pick any mix of days — weekdays, individual weekend days, whatever works.
        </div>
        <div className="flex gap-2">
          <button className="btn-ghost" onClick={onClose}>Cancel</button>
          <button
            className="btn-primary"
            disabled={selected.size === 0}
            onClick={() => { onConfirm([...selected], slot); onClose(); }}
          >
            Book {selected.size || 0} day{selected.size === 1 ? "" : "s"}
          </button>
        </div>
      </div>
    </Modal>
  );
}

function NamePicker({ onPick }) {
  const [query, setQuery] = useState("");
  const [open, setOpen] = useState(false);
  const inputRef = useRef(null);
  const containerRef = useRef(null);

  const filtered = TEAM_MEMBERS.filter(name =>
    name.toLowerCase().includes(query.toLowerCase())
  );

  useEffect(() => {
    function onOutsideClick(e) {
      if (containerRef.current && !containerRef.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener("mousedown", onOutsideClick);
    return () => document.removeEventListener("mousedown", onOutsideClick);
  }, []);

  function handleSelect(name) {
    setOpen(false);
    onPick(name);
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="w-full max-w-sm bg-[var(--card)] rounded-[16px] card-shadow-lg p-7">
        <div className="flex items-center gap-2 text-[var(--accent)]">
          <Icon name="Users" size={18} />
          <span className="text-[12px] uppercase tracking-[0.14em] font-semibold">Office attendance</span>
        </div>
        <h1 className="mt-3 text-[26px] font-semibold leading-tight">Who are you?</h1>
        <p className="mt-1.5 text-[14px] text-[var(--ink-2)]">
          Search for your name to get started.
        </p>

        <div ref={containerRef} className="mt-5 relative">
          <div className={`flex items-center gap-2 rounded-[10px] border px-3 py-2.5 transition ${open ? "border-[var(--accent)]" : "border-[var(--line-2)]"}`}>
            <Icon name="Search" size={15} className="text-[var(--ink-3)] shrink-0" />
            <input
              ref={inputRef}
              type="text"
              placeholder="Search your name…"
              value={query}
              autoFocus
              onFocus={() => setOpen(true)}
              onChange={e => { setQuery(e.target.value); setOpen(true); }}
              className="flex-1 bg-transparent text-[14px] text-[var(--ink)] placeholder:text-[var(--ink-3)] outline-none"
            />
            {query && (
              <button
                onMouseDown={e => { e.preventDefault(); setQuery(""); inputRef.current?.focus(); }}
                className="text-[var(--ink-3)] hover:text-[var(--ink)] transition"
                aria-label="Clear"
              >
                <Icon name="X" size={13} />
              </button>
            )}
          </div>

          {open && (
            <div className="absolute left-0 right-0 mt-1.5 bg-[var(--card)] rounded-[10px] border border-[var(--line)] card-shadow overflow-hidden z-10 max-h-60 overflow-y-auto">
              {filtered.length > 0 ? filtered.map(name => (
                <button
                  key={name}
                  onMouseDown={() => handleSelect(name)}
                  className="w-full flex items-center gap-2.5 px-3 py-2.5 text-left text-[14px] font-medium hover:bg-[rgba(0,158,227,0.07)] transition"
                >
                  {name}
                </button>
              )) : (
                <div className="px-3 py-4 text-center text-[13px] text-[var(--ink-3)]">
                  No match for &ldquo;{query}&rdquo;
                </div>
              )}
            </div>
          )}
        </div>

        <p className="mt-5 text-[11.5px] text-[var(--ink-3)] leading-relaxed">
          Heads up: bookings are shared with everyone on the team. No passwords, nothing private here.
        </p>
      </div>
    </div>
  );
}

// ---------- Month view ----------
function MonthView({ anchor, bookings, onDayClick, onDayDetails, currentUser }) {
  // 6x7 grid starting Monday
  const monthStart = startOfMonth(anchor);
  const gridStart = startOfWeek(monthStart);
  const weeks = [];
  for (let w = 0; w < 6; w++) {
    const row = [];
    for (let i = 0; i < 7; i++) row.push(addDays(gridStart, w*7 + i));
    weeks.push(row);
  }
  const today = new Date(); today.setHours(0,0,0,0);

  return (
    <div className="bg-[var(--card)] rounded-[14px] border border-[var(--line)] card-shadow overflow-hidden">
      <div className="grid grid-cols-7 text-[11px] uppercase tracking-[0.1em] font-semibold border-b border-[var(--line)]">
        {WEEKDAY_SHORT.map((d, i) => {
          const isWknd = i >= 5;
          return (
            <div key={d} className={`px-3 py-2.5 text-left bg-[var(--bg-2)] text-[var(--ink-3)] ${isWknd ? "opacity-60" : ""}`}>
              {d}
            </div>
          );
        })}
      </div>
      <div className="grid grid-cols-7 auto-rows-fr">
        {weeks.flat().map((d, i) => {
          const key = ymd(d);
          const inMonth = d.getMonth() === anchor.getMonth();
          const weekend = isWeekend(d);
          const entries = bookings[key] || [];
          const isToday = isSameDay(d, today);
          const isPast = d < today && !isToday;

          return (
            <DayCell
              key={i}
              date={d}
              entries={entries}
              inMonth={inMonth}
              weekend={weekend}
              isToday={isToday}
              isPast={isPast}
              currentUser={currentUser}
              holiday={BANK_HOLIDAYS_2026[key] || null}
              onQuickBook={() => onDayClick(d)}
              onDetails={() => onDayDetails(d)}
            />
          );
        })}
      </div>
    </div>
  );
}

function DayCell({ date, entries, inMonth, weekend, isToday, isPast, currentUser, onQuickBook, onDetails, holiday }) {
  const [showAll, setShowAll] = useState(false);
  const mineIn = entries.some(e => e.name === currentUser);

  const MAX = 3;
  const shown = showAll ? entries : entries.slice(0, MAX);
  const extra = entries.length - shown.length;

  return (
    <div
      className={`day-cell relative border-r border-b border-[var(--line)] min-h-[112px] p-2 flex flex-col
        ${weekend ? "is-weekend bg-[var(--weekend)]" : holiday ? "is-holiday bg-[var(--holiday)]" : ""}
        ${isPast ? "is-past" : ""}
        ${isToday ? "is-today" : ""}
        ${!inMonth ? "opacity-55" : ""}
      `}
    >
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-1.5 min-w-0 flex-1">
          <span className={`text-[13px] font-semibold leading-none shrink-0 ${isToday ? "text-[var(--accent)]" : inMonth ? "text-[var(--ink)]" : "text-[var(--ink-3)]"}`}>
            {date.getDate()}
          </span>
          {isToday && <span className="text-[9px] uppercase tracking-[0.1em] font-bold text-[var(--accent)] shrink-0">Today</span>}
          {mineIn && <span className="w-1.5 h-1.5 rounded-full bg-[var(--accent)] shrink-0" title="You're booked" />}
          {holiday && (
            <span className="text-[9px] font-semibold uppercase tracking-wide truncate leading-tight text-[#006B9F]">
              {holiday}
            </span>
          )}
        </div>

        {!weekend && !isPast && (
          <button
            onClick={onQuickBook}
            className="opacity-0 hover:opacity-100 focus:opacity-100 group-hover:opacity-100 text-[var(--ink-3)] hover:text-[var(--accent)] rounded-md p-0.5 transition"
            style={{ opacity: entries.length === 0 ? undefined : undefined }}
            aria-label="Book this day"
          >
            <Icon name="Plus" size={13} />
          </button>
        )}
      </div>

      <button
        type="button"
        onClick={entries.length > 0 ? onDetails : (!weekend && !isPast ? onQuickBook : undefined)}
        className="mt-1.5 flex-1 flex flex-col gap-1 text-left -m-0.5 p-0.5 rounded-md"
      >
        {shown.map(e => (
          <NameChip key={e.id} name={e.name} slot={e.slot} />
        ))}
        {extra > 0 && (
          <span
            onClick={(ev) => { ev.stopPropagation(); onDetails(); }}
            className="text-[11px] text-[var(--ink-2)] font-medium hover:text-[var(--accent)] px-1.5 py-0.5 cursor-pointer"
          >
            +{extra} more
          </span>
        )}
        {entries.length === 0 && !weekend && !isPast && (
          <span className="text-[11px] text-[var(--ink-3)] opacity-0 hover:opacity-100 transition">Click to book</span>
        )}
      </button>
    </div>
  );
}

// ---------- Week view ----------
function WeekView({ anchor, bookings, currentUser, onDayClick, onDayDetails }) {
  const mon = startOfWeek(anchor);
  const days = Array.from({length: 7}, (_, i) => addDays(mon, i));
  const today = new Date(); today.setHours(0,0,0,0);

  return (
    <div className="grid grid-cols-7 gap-3">
      {days.map(d => {
        const key = ymd(d);
        const entries = bookings[key] || [];
        const weekend = isWeekend(d);
        const isToday = isSameDay(d, today);
        const isPast = d < today && !isToday;
        const mineIn = entries.some(e => e.name === currentUser);
        const grouped = {
          full: entries.filter(e => e.slot === "full"),
          am:   entries.filter(e => e.slot === "am"),
          pm:   entries.filter(e => e.slot === "pm"),
        };

        const holiday = BANK_HOLIDAYS_2026[key] || null;
        return (
          <div
            key={key}
            className={`rounded-[14px] border card-shadow overflow-hidden flex flex-col min-h-[420px]
              ${isToday ? "border-[var(--accent)]" : "border-[var(--line)]"}
              ${weekend ? "is-weekend bg-[var(--weekend)]" : holiday ? "bg-[var(--holiday)]" : "bg-[var(--card)]"}
            `}
          >
            <div className="px-3.5 py-3 border-b border-[var(--line)] flex items-center justify-between">
              <div className="min-w-0 flex-1">
                <div className="text-[10.5px] uppercase tracking-[0.12em] font-semibold text-[var(--ink-3)]">
                  {WEEKDAY_SHORT[(d.getDay()+6)%7]}
                </div>
                <div className="flex items-baseline gap-1.5 mt-0.5">
                  <span className={`text-[22px] font-semibold leading-none ${isToday ? "text-[var(--accent)]" : ""}`}>
                    {d.getDate()}
                  </span>
                  <span className="text-[11px] text-[var(--ink-3)]">{MONTH_NAMES[d.getMonth()].slice(0,3)}</span>
                </div>
                {holiday && (
                  <div className="text-[9px] font-semibold uppercase tracking-wide mt-0.5 truncate text-[#006B9F]">
                    {holiday}
                  </div>
                )}
              </div>
              <div className="flex items-center gap-1">
                {mineIn && <span className="text-[10px] uppercase font-semibold tracking-wider text-[var(--accent)] bg-[var(--accent-soft)] px-1.5 py-0.5 rounded-md">You</span>}
                {!weekend && !isPast && (
                  <button
                    onClick={() => onDayClick(d)}
                    className="p-1 rounded-md text-[var(--ink-3)] hover:text-[var(--accent)] hover:bg-[var(--accent-soft)] transition"
                    aria-label="Book"
                  >
                    <Icon name="Plus" size={14} />
                  </button>
                )}
              </div>
            </div>

            <button
              type="button"
              onClick={entries.length > 0 ? () => onDayDetails(d) : (!weekend && !isPast ? () => onDayClick(d) : undefined)}
              className="flex-1 p-3 text-left space-y-3"
            >
              {entries.length === 0 && (
                <div className="h-full flex items-center justify-center text-[12px] text-[var(--ink-3)] italic">
                  {weekend ? "Weekend" : isPast ? "—" : "Empty"}
                </div>
              )}

              {["full","am","pm"].map(slot => grouped[slot].length > 0 && (
                <div key={slot}>
                  <div className="text-[9.5px] uppercase tracking-[0.12em] font-bold text-[var(--ink-3)] mb-1.5">
                    {slot === "full" ? "Full day" : slot === "am" ? "Morning" : "Afternoon"}
                  </div>
                  <div className="flex flex-wrap gap-1">
                    {grouped[slot].map(e => <NameChip key={e.id} name={e.name} slot={e.slot} />)}
                  </div>
                </div>
              ))}
            </button>
          </div>
        );
      })}
    </div>
  );
}

// ---------- Main app ----------
function App() {
  const { bookings, loading, error, saving, lastSync, rateLimited, insertBookings, deleteBooking, updateSlot } = useStorage();
  const [prefs, setPrefs, prefsReady] = usePrefs();
  const [anchor, setAnchor] = useState(() => { const d = new Date(); d.setHours(0,0,0,0); return d; });
  const [bookingModal, setBookingModal] = useState(null); // {kind: 'day'|'multi', date}
  const [detailsDate, setDetailsDate] = useState(null);

  const view = prefs.view || "month";
  const currentUser = prefs.user;

  // Shift anchor when view changes
  const goPrev = () => setAnchor(a => view === "month" ? new Date(a.getFullYear(), a.getMonth()-1, 1) : addDays(a, -7));
  const goNext = () => setAnchor(a => view === "month" ? new Date(a.getFullYear(), a.getMonth()+1, 1) : addDays(a, +7));
  const goToday = () => { const d = new Date(); d.setHours(0,0,0,0); setAnchor(d); };

  const handleConfirm = useCallback(async (dates, slot) => {
    const { rowsToInsert, idsToDelete } = planBookingInserts(bookings, dates, currentUser, slot);
    // Delete "full"-replaced conflicts in parallel, then insert
    await Promise.allSettled(idsToDelete.map(({ date, id }) => deleteBooking(date, id)));
    if (rowsToInsert.length) await insertBookings(rowsToInsert);
  }, [bookings, currentUser, insertBookings, deleteBooking]);

  const handleDelete = useCallback((date, id) => deleteBooking(date, id), [deleteBooking]);

  const handleUpdateSlot = useCallback((date, id, slot) => updateSlot(date, id, slot), [updateSlot]);

  // Stats for header
  const headerLabel = useMemo(() => {
    if (view === "month") return `${MONTH_NAMES[anchor.getMonth()]} ${anchor.getFullYear()}`;
    const mon = startOfWeek(anchor), sun = addDays(mon, 6);
    const sameMonth = mon.getMonth() === sun.getMonth();
    return sameMonth
      ? `${mon.getDate()} – ${sun.getDate()} ${MONTH_NAMES[mon.getMonth()]} ${mon.getFullYear()}`
      : `${mon.getDate()} ${MONTH_NAMES[mon.getMonth()]} – ${sun.getDate()} ${MONTH_NAMES[sun.getMonth()]} ${mon.getFullYear()}`;
  }, [anchor, view]);

  const todayCount = (bookings[ymd(new Date())] || []).length;

  if (!prefsReady) {
    return (
      <div className="min-h-screen flex items-center justify-center text-[13px] text-[var(--ink-3)]">
        Loading…
      </div>
    );
  }

  if (!currentUser) {
    return <NamePicker onPick={(name) => setPrefs({ user: name })} />;
  }

  return (
    <div className="min-h-screen">
      {/* Top bar */}
      <header className="sticky top-0 z-30 bg-[var(--card)] backdrop-blur border-b border-[var(--line)]">
        <div className="max-w-[1400px] mx-auto px-6 py-4 flex items-center gap-4">
          <div className="flex items-center gap-2.5">
            <div className="w-8 h-8 rounded-[9px] bg-[var(--sage)] text-white flex items-center justify-center">
              <Icon name="Building2" size={17} />
            </div>
            <div className="leading-tight">
              <div className="text-[15px] font-semibold">Office hub</div>
              <div className="text-[11px] text-[var(--ink-3)]">Open desks · shared with the team</div>
            </div>
          </div>

          <div className="ml-6 flex items-center gap-3">
            <div className="hidden sm:flex items-center gap-1 text-[12.5px] text-[var(--ink-2)]">
              <span className="w-1.5 h-1.5 rounded-full bg-[var(--sage)]" />
              <span><strong className="font-semibold text-[var(--ink)]">{todayCount}</strong> in today</span>
            </div>
          </div>

          <div className="ml-auto flex items-center gap-2">
            {/* Sync indicator */}
            <div className="hidden md:flex items-center gap-1.5 text-[11.5px] text-[var(--ink-3)]" title={lastSync ? "Synced " + lastSync.toLocaleTimeString() : "Syncing..."}>
              {rateLimited
                ? <span className="text-[#E07B00]">Slow down ✋</span>
                : saving
                  ? <><span className="w-1.5 h-1.5 rounded-full bg-[var(--accent)] animate-pulse" />Saving</>
                  : error
                    ? <span className="text-[#C0392B]" title={error}>Sync error</span>
                    : <><span className="w-1.5 h-1.5 rounded-full bg-[var(--sage)]" />Live · shared</>}
            </div>

            {/* Current user */}
            <div className="flex items-center gap-2 pl-3 ml-1 border-l border-[var(--line)]">
              <span style={chipStyle(currentUser)} className="chip-dot w-2 h-2 rounded-full" />
              <span className="text-[13px] font-medium">{currentUser}</span>
              <button
                onClick={() => setPrefs({ user: null })}
                className="text-[11.5px] text-[var(--ink-3)] hover:text-[var(--accent)] underline underline-offset-2 decoration-dotted"
              >
                change
              </button>
            </div>
          </div>
        </div>
      </header>

      {/* Toolbar */}
      <div className="max-w-[1400px] mx-auto px-6 pt-5 pb-3 flex items-center gap-3 flex-wrap">
        <div className="flex items-center gap-1">
          <button onClick={goPrev} className="btn-outline !p-2" aria-label="Previous">
            <Icon name="ChevronLeft" size={16} />
          </button>
          <button onClick={goNext} className="btn-outline !p-2" aria-label="Next">
            <Icon name="ChevronRight" size={16} />
          </button>
          <button onClick={goToday} className="btn-outline !ml-1">Today</button>
        </div>

        <h1 className="text-[22px] font-semibold tracking-tight">{headerLabel}</h1>

        <div className="ml-auto flex items-center gap-2">
          <button
            onClick={() => setBookingModal({ kind: "multi", date: anchor })}
            className="btn-outline inline-flex items-center gap-1.5"
          >
            <Icon name="CalendarDays" size={15} />
            Book multiple days
          </button>

          <button
            onClick={() => setBookingModal({ kind: "day", date: new Date() })}
            className="btn-primary inline-flex items-center gap-1.5"
            style={{ background: "var(--sage)" }}
          >
            <Icon name="Plus" size={15} />
            Book a day
          </button>

          {/* View toggle */}
          <div className="segmented ml-1">
            <button aria-pressed={view === "month"} onClick={() => setPrefs({ view: "month" })}>
              <span className="inline-flex items-center gap-1.5"><Icon name="LayoutGrid" size={13}/>Month</span>
            </button>
            <button aria-pressed={view === "week"} onClick={() => setPrefs({ view: "week" })}>
              <span className="inline-flex items-center gap-1.5"><Icon name="Columns3" size={13}/>Week</span>
            </button>
          </div>
        </div>
      </div>

      {/* Content */}
      <main className="max-w-[1400px] mx-auto px-6 pb-10">
        {loading ? (
          <div className="grid place-items-center py-20 text-[13px] text-[var(--ink-3)]">
            <div className="flex items-center gap-2">
              <span className="w-2 h-2 rounded-full bg-[var(--accent)] animate-pulse" />
              Loading bookings…
            </div>
          </div>
        ) : error ? (
          <div className="rounded-[12px] border border-[rgba(220,50,50,0.4)] bg-[rgba(220,50,50,0.12)] p-4 text-[13px] text-[oklch(0.75_0.15_25)]">
            <strong>Couldn't load shared data.</strong> Retrying… <span className="opacity-70">({error})</span>
          </div>
        ) : view === "month" ? (
          <MonthView
            anchor={anchor}
            bookings={bookings}
            currentUser={currentUser}
            onDayClick={(d) => {
              if (isWeekend(d)) { setBookingModal({ kind: "day", date: d }); return; }
              const today = new Date(); today.setHours(0,0,0,0);
              if (d < today) { setDetailsDate(d); return; }
              // if empty slot, go direct to book; if has entries, open details
              const entries = bookings[ymd(d)] || [];
              if (entries.length === 0) setBookingModal({ kind: "day", date: d });
              else setDetailsDate(d);
            }}
            onDayDetails={(d) => setDetailsDate(d)}
          />
        ) : (
          <WeekView
            anchor={anchor}
            bookings={bookings}
            currentUser={currentUser}
            onDayClick={(d) => setBookingModal({ kind: "day", date: d })}
            onDayDetails={(d) => setDetailsDate(d)}
          />
        )}

        {/* Legend */}
        <div className="mt-6 flex items-center gap-4 flex-wrap text-[11.5px] text-[var(--ink-3)]">
          <span className="inline-flex items-center gap-1.5">
            <span className="w-2 h-2 rounded-full bg-[var(--sage)]" />
            = you're booked
          </span>
          <span className="inline-flex items-center gap-1.5">
            <span className="px-1.5 py-0.5 rounded bg-[var(--weekend)] border border-[var(--line)]">Sat/Sun</span>
            = weekend (single-day bookings still allowed)
          </span>
          <span className="ml-auto">Press <span className="kbd">←</span> <span className="kbd">→</span> to navigate · <span className="kbd">M</span>/<span className="kbd">W</span> to switch view</span>
        </div>
      </main>

      {/* Modals */}
      {bookingModal?.kind === "day" && (
        <SingleDayModal
          date={bookingModal.date}
          currentUser={currentUser}
          bookings={bookings}
          onClose={() => setBookingModal(null)}
          onConfirm={handleConfirm}
        />
      )}
      {bookingModal?.kind === "multi" && (
        <MultiDayModal
          anchor={bookingModal.date}
          currentUser={currentUser}
          bookings={bookings}
          onClose={() => setBookingModal(null)}
          onConfirm={handleConfirm}
        />
      )}
      {detailsDate && (
        <DayDetailModal
          date={detailsDate}
          bookings={bookings}
          currentUser={currentUser}
          onClose={() => setDetailsDate(null)}
          onDelete={handleDelete}
          onUpdateSlot={handleUpdateSlot}
          onAddClick={() => { setBookingModal({ kind: "day", date: detailsDate }); setDetailsDate(null); }}
        />
      )}

      {/* Global hotkeys */}
      <HotKeys
        onPrev={goPrev}
        onNext={goNext}
        onToday={goToday}
        onMonth={() => setPrefs({ view: "month" })}
        onWeek={() => setPrefs({ view: "week" })}
        disabled={!!bookingModal || !!detailsDate}
      />
    </div>
  );
}

function HotKeys({ onPrev, onNext, onToday, onMonth, onWeek, disabled }) {
  useEffect(() => {
    const h = e => {
      if (disabled) return;
      if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
      if (e.key === "ArrowLeft") onPrev();
      else if (e.key === "ArrowRight") onNext();
      else if (e.key === "t" || e.key === "T") onToday();
      else if (e.key === "m" || e.key === "M") onMonth();
      else if (e.key === "w" || e.key === "W") onWeek();
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [onPrev, onNext, onToday, onMonth, onWeek, disabled]);
  return null;
}

// ---------- fallback shim for Supabase client (prevents blank page if CDN fails) ----------
if (!window.supabase) {
  console.warn("[attendance] Supabase client failed to load. Running in read-only fallback.");
}

// ---------- Error boundary ----------
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: "12px", fontFamily: "Inter, sans-serif", background: "#FFFFFF", color: "rgba(0,59,100,0.65)" }}>
          <strong style={{ fontSize: "15px", color: "#003B64" }}>Something went wrong</strong>
          <span style={{ fontSize: "13px" }}>Please reload the page. If the problem persists, clear site data.</span>
          <button onClick={() => window.location.reload()} style={{ marginTop: "4px", padding: "6px 16px", borderRadius: "8px", border: "1px solid rgba(0,59,100,0.18)", background: "rgba(0,158,227,0.07)", color: "#003B64", cursor: "pointer", fontSize: "13px" }}>Reload</button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
